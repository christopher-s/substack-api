<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Substack API — substack-api reference</title>
    <meta
      name="description"
      content="OpenAPI 3.1 reference for the underlying Substack HTTP API used by the substack-api TypeScript client. Browse every endpoint, parameter, and response shape, and try requests live."
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FF6719'/%3E%3Ctext x='50' y='66' text-anchor='middle' font-family='Helvetica,Arial,sans-serif' font-weight='700' font-size='52' fill='white'%3ES%3C/text%3E%3C/svg%3E" />
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        background: #ffffff;
      }
      header.top {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.65rem 1.25rem;
        background: #1a1a1a;
        color: #fafafa;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      header.top .brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 600;
        font-size: 0.95rem;
      }
      header.top .brand .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.5rem;
        height: 1.5rem;
        border-radius: 0.35rem;
        background: #ff6719;
        color: white;
        font-weight: 700;
        font-size: 0.85rem;
      }
      header.top a {
        color: #fafafa;
        text-decoration: none;
        font-size: 0.85rem;
        opacity: 0.85;
        transition: opacity 0.15s ease;
      }
      header.top a:hover {
        opacity: 1;
        text-decoration: underline;
      }
      header.top nav {
        display: flex;
        gap: 1rem;
        align-items: center;
      }
      #app {
        height: calc(100vh - 3rem);
      }
      noscript .nojs {
        padding: 2rem;
        max-width: 40rem;
        margin: 2rem auto;
        background: #fff7e6;
        border: 1px solid #ffd591;
        border-radius: 0.5rem;
      }
    </style>
  </head>
  <body>
    <header class="top">
      <div class="brand">
        <span class="badge">S</span>
        <span>Substack API reference</span>
      </div>
      <nav>
        <a
          href="https://github.com/christopher-s/substack-api"
          target="_blank"
          rel="noopener"
          >GitHub repository</a
        >
        <a href="./openapi.yaml" target="_blank" rel="noopener">openapi.yaml</a>
      </nav>
    </header>
    <noscript>
      <div class="nojs">
        <h2>JavaScript required</h2>
        <p>
          This documentation is rendered by
          <a href="https://github.com/scalar/scalar">Scalar</a>, which requires
          JavaScript. The raw OpenAPI document is available at
          <a href="./openapi.yaml">./openapi.yaml</a>.
        </p>
      </div>
    </noscript>

    <div id="app"></div>

    <!--
      Scalar API Reference (pinned to the v1 major line so the render is stable).
      The CDN-hosted bundle ships its own UMD global `Scalar.createApiReference`.
    -->
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@1"></script>
    <script>
      Scalar.createApiReference('#app', {
        url: './openapi.yaml',
        theme: 'default',
        layout: 'modern',
        hideDarkModeToggle: false,
        metaData: {
          title: 'Substack API — substack-api reference',
          description:
            'OpenAPI 3.1 reference for the underlying Substack HTTP API used by the substack-api TypeScript client.'
        }
      });
    </script>
  </body>
</html>
