        unread indicator. Called automatically when the user opens the chat page.
      operationId: markInboxSeen
      security:
        - substackSession: []
      responses:
        '200':
          description: Inbox marked as seen.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/messages/dm/{conversationId}:
    get:
      tags:
        - chat
      summary: Get direct message conversation
      description: |
        Retrieves messages in a DM conversation. The `conversationId` is a UUID
        (e.g. `d2f49720-3ce0-4ce8-99fc-4cf7439698ca`). Supports cursor-based
        pagination for loading older messages. Publication chat rooms use a
        different ID format (`chat-{publicationId}`) and are not accessible via
        this endpoint.
      operationId: getDmMessages
      security:
        - substackSession: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the DM conversation.
        - in: query
          name: cursor
          schema:
            type: string
          description: Opaque pagination cursor for loading older messages.
      responses:
        '200':
          description: DM conversation with messages and participant info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmConversation'
        '400':
          description: Invalid conversation ID (e.g. non-UUID format).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - chat
      summary: Send a DM message
      description: |
        Sends a message in a DM conversation. Returns the created message with
        thread metadata and participant info. The `client_id` must be a UUID
        (used for idempotency / deduplication).
      operationId: sendDmMessage
      security:
        - substackSession: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the DM conversation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendDmMessageRequest'
      responses:
        '200':
          description: Message sent successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendDmMessageResponse'
        '400':
          description: Invalid request body or non-UUID client_id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/messages/dm/{conversationId}/seen:
    post:
      tags:
        - chat
      summary: Mark DM conversation as seen
      description: |
        Marks all messages in a DM conversation as seen by the authenticated
        user. Called when the user opens a conversation.
      operationId: markDmSeen
      security:
        - substackSession: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the DM conversation.
      responses:
        '200':
          description: Conversation marked as seen.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
