          format: date-time
          nullable: true
          description: Timestamp of the most recent chat activity.
    ChatThread:
      type: object
      description: |
        A single thread in the chat inbox. Can be a direct message (`type:
        direct-message`) or a publication chat room (`type: chat`).
      required: [type, id, timestamp]
      properties:
        type:
          type: string
          enum:
            - direct-message
            - chat
          description: Thread type — direct message or publication chat room.
        id:
          type: string
          description: |
            Thread identifier. DMs use a UUID format. Publication chats use
            `chat-{publicationId}`.
        communityPost:
          type: object
          nullable: true
          description: Community post metadata (present for publication chat rooms).
        user:
          type: object
          nullable: true
          description: Other user in the conversation (DMs only).
        publication:
          type: object
          nullable: true
          description: Publication metadata (present for publication chat rooms).
        muteStatus:
          type: string
          nullable: true
        paywallStatus:
          type: string
          nullable: true
        isPinned:
          type: boolean
        lastViewedAt:
          type: string
          format: date-time
          nullable: true
        avatarURLs:
          type: array
          items:
            type: string
          description: Avatar image URLs for the thread participants.
        title:
          type: string
          description: Display title of the thread.
        accessoryImageURL:
          type: string
          nullable: true
        heroImageURLs:
          type: array
          items:
            type: string
          nullable: true
        subtitleBody:
          type: string
          nullable: true
          description: Preview text (last message or description).
        timestamp:
          type: string
          format: date-time
        messageThread:
          type: object
          nullable: true
          description: Full thread metadata with members (present in invite listings).
        recentMessage:
          type: object
          nullable: true
          description: Most recent message preview.
        unreadCount:
          type: integer
          nullable: true
        bestsellerTier:
          type: integer
          nullable: true
        subscriberContext:
          type: object
          nullable: true
      additionalProperties: true
    DmConversation:
      type: object
      description: A DM conversation with messages and participant details.
      required: [messages, more]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        user:
          $ref: '#/components/schemas/ChatUser'
        more:
          type: boolean
          description: Whether more (older) messages exist.
        cursor:
          type: string
          nullable: true
          description: Pagination cursor for loading older messages.
      additionalProperties: true
    ChatMessage:
      type: object
      description: A single message in a DM or chat conversation.
      required: [id, created_at, updated_at, user_id, conversation_id, body, status]
      properties:
        id:
          type: string
          description: |
            Composite message ID. Format: `{conversationId}-{ISO timestamp}`
            (e.g. `d2f49720-3ce0-4ce8-99fc-4cf7439698ca-2025-09-16T23:16:13.436Z`).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user_id:
          type: integer
          description: ID of the message author.
        conversation_id:
          type: string
          description: UUID of the parent conversation.
        post_id:
          type: string
          description: Post/conversation ID the message belongs to.
        body:
          type: string
          description: Rendered message body (HTML).
        raw_body:
          type: string
          description: Raw message body (plain text).
        media_uploads:
          type: array
          nullable: true
          items:
            type: object
          description: Attached media files.
        parent_id:
          type: string
          nullable: true
          description: Parent message ID for threaded replies.
        is_locked:
          type: boolean
          description: Whether the message is locked (moderated).
        status:
          type: string
          enum:
            - published
            - deleted
        quote_id:
          type: string
          nullable: true
        reactions:
          type: object
          description: Map of reaction type to reaction details.
          additionalProperties: true
      additionalProperties: true
    ChatUser:
      type: object
      description: User profile in a chat context.
      required: [id, name, handle]
      properties:
        id:
          type: string
          description: User identifier (UUID or numeric string).
        name:
          type: string
        bio:
          type: string
        photo_url:
          type: string
          format: uri
        link:
          type: string
          format: uri
        bestseller_tier:
          type: integer
        status:
          type: object
          additionalProperties: true
        primary_publication_id:
          type: integer
          nullable: true
        primary_publication_iap_enabled:
          type: boolean
        writes:
          type: string
          description: Name of the user's primary publication.
        is_subscribed:
          type: boolean
        is_blocking:
          type: boolean
        is_muting:
          type: boolean
        is_following:
          type: boolean
        can_follow:
          type: boolean
        handle:
          type: string
        can_dm:
          type: boolean
        reader_installed_at:
          type: string
          format: date-time
          nullable: true
        last_seen_at:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true
    DmInvites:
      type: object
      description: Pending chat invitations / DM requests.
      required: [threads, spamThreads, subscriberThreads, more]
      properties:
        threads:
          type: array
          description: Regular pending invite threads.
          items:
            $ref: '#/components/schemas/ChatThread'
        spamThreads:
          type: array
          description: Spam-flagged invite threads.
          items:
            $ref: '#/components/schemas/ChatThread'
        subscriberThreads:
          type: array
          description: Invite threads from subscribers.
          items:
            $ref: '#/components/schemas/ChatThread'
        more:
          type: boolean
        pendingInviteCount:
          type: integer
        pendingInviteUnreadCount:
          type: integer
        newPendingInviteUnreadCount:
          type: integer
        directMessagesUnreadCount:
          type: integer
      additionalProperties: true
    ThreadReactions:
      type: object
      description: Catalog of available emoji reactions for chat messages.
      required: [suggestedReactionTypes, categories, reactionTypes]
      properties:
        suggestedReactionTypes:
          type: array
          items:
            type: string
          description: Short list of suggested reaction emoji names.
        categories:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                description: Category display name (e.g. "Frequently used").
              reactionTypes:
                type: array
                items:
                  type: string
                description: Emoji names in this category.
        reactionTypes:
          type: object
          description: Map of emoji name to unicode character.
          additionalProperties:
            type: string
      additionalProperties: true
    RealtimeToken:
      type: object
      description: JWT token and endpoint for realtime WebSocket connections.
      required: [token, expiry, permissions, endpoint]
      properties:
        token:
          type: string
          description: JWT token for WebSocket authentication.
        expiry:
          type: string
          format: date-time
          description: Token expiration timestamp.
        permissions:
          type: array
          items:
            type: string
          description: |
            Permission strings (e.g. `subscribe|user:{id}`,
            `unsubscribe|user:{id}`).
        endpoint:
          type: string
          description: WebSocket URL for realtime connections.
          example: wss://zyncrealtime.substack.com
    SendDmMessageRequest:
      type: object
      required: [body, client_id]
      properties:
        body:
          type: string
          description: Message body (plain text).
        client_id:
          type: string
          format: uuid
          description: Client-generated UUID for idempotency / deduplication.
    SendDmMessageResponse:
      type: object
      required: [thread, reply]
      properties:
        thread:
          $ref: '#/components/schemas/DmThreadDetail'
        reply:
          type: object
          required: [comment, user]
          properties:
            comment:
              $ref: '#/components/schemas/ChatMessage'
            user:
              $ref: '#/components/schemas/ChatUser'
            client_id:
              type: string
              format: uuid
              description: Echo of the client-provided idempotency key.
        publications:
          type: array
          description: Publication objects referenced in the message.
          items:
            type: object
        comments:
          type: array
          description: Additional comment context (e.g. quoted messages).
          items:
            type: object
    DmThreadDetail:
      type: object
      description: Full DM thread metadata with member details.
      required: [id, created_at, updated_at, members]
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        first_message_created_at:
          type: string
          format: date-time
          nullable: true
        members:
          type: array
          items:
            $ref: '#/components/schemas/DmThreadMember'
        is_one_on_one:
          type: boolean
          description: Whether this is a 1:1 DM (vs group).
        is_pinned:
          type: boolean
        createdBy:
          type: integer
          description: User ID of the thread creator.
      additionalProperties: true
    DmThreadMember:
      type: object
      description: A member in a DM thread with their state.
      required: [user_id, membership_state]
      properties:
        user_id:
          type: integer
        membership_state:
          type: string
          enum: [accepted, pending]
          description: Whether the member has accepted the conversation.
        history_start_at:
          type: string
          format: date-time
          nullable: true
        unmute_at:
          type: string
          format: date-time
          nullable: true
        last_viewed_at:
          type: string
          format: date-time
          nullable: true
        last_emailed_at:
          type: string
          format: date-time
          nullable: true
        user:
          $ref: '#/components/schemas/ChatUser'
      additionalProperties: true

    # ── New schemas for confirmed-accessible endpoints ─────────────────

    PublicationExport:
      type: object
      description: A data export job record for a publication.
      properties:
        id:
          type: integer
          description: Export job ID.
        type:
          type: string
          description: Export type (e.g. `posts`, `subscribers`).
        status:
          type: string
          description: Export status (e.g. `pending`, `complete`).
        created_at:
          type: string
          format: date-time
          description: When the export was requested.
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: When the export completed.
        download_url:
          type: string
          format: uri
          nullable: true
          description: URL to download the export file (available when complete).
      additionalProperties: true

    PublicationSearchResult:
      type: object
      description: A publication returned by the publication search endpoint.
      properties:
        id:
          type: integer
          description: Publication ID.
        name:
          type: string
          description: Publication name.
        slug:
          type: string
          description: Publication slug (subdomain).
        description:
          type: string
          nullable: true
          description: Publication description.
        logo_url:
          type: string
          format: uri
          nullable: true
          description: Publication logo URL.
        author_id:
          type: integer
          description: Primary author user ID.
        author_name:
          type: string
          description: Primary author name.
        author_handle:
          type: string
          description: Primary author handle.
      additionalProperties: true

    # ── New schemas for auth-gated endpoints ────────────────────────────

    PublicationSubscriberList:
      type: object
      description: Paginated list of publication subscribers.
      properties:
        subscribers:
          type: array
          items:
            $ref: '#/components/schemas/SubscriberEntry'
        total:
          type: integer
          description: Total subscriber count.
        more:
          type: boolean
          description: Whether more results are available.
      additionalProperties: true

    SubscriberEntry:
      type: object
      description: A single subscriber record with metadata.
      properties:
        total_count:
          type: integer
          description: Total engagement count.
        user_email_address:
          type: string
          format: email
          description: Subscriber email address.
        user_photo_url:
          type: string
          format: uri
          nullable: true
          description: Subscriber avatar URL.
        user_name:
          type: string
          description: Subscriber display name.
        user_id:
          type: integer
          description: Subscriber user ID.
        subscription_type:
          type: string
          description: Subscription tier (e.g. `free`, `paid`, `founding`).
        activity_rating:
          type: number
          description: Activity engagement score.
        subscription_created_at:
          type: string
          format: date-time
          description: When the subscription was created.
        total_revenue_generated:
          type: number
          description: Total revenue from this subscriber.
        subscription_id:
          type: integer
          description: Unique subscription ID.
        subscription_interval:
          type: string
          description: Billing interval (e.g. `monthly`, `yearly`).
        is_subscribed:
          type: boolean
          description: Whether the subscription is currently active.
        is_founding:
          type: boolean
          description: Whether this is a founding member.
        is_gift:
          type: boolean
          description: Whether this is a gifted subscription.
        is_comp:
          type: boolean
          description: Whether this is a complimentary subscription.
        is_free_trial:
          type: boolean
          description: Whether this subscription is in a free trial.
        is_bitcoin:
          type: boolean
          description: Whether payment was made via Bitcoin.
      additionalProperties: true

    PublicationRevenue:
      type: object
      description: Revenue analytics for a publication.
      additionalProperties: true

    PublicationInsights:
      type: object
      description: Publication insights summary covering growth, engagement, and audience.
      additionalProperties: true

    FollowerStats:
      type: object
      description: Follower statistics for a publication.
      additionalProperties: true

    PublicationPayments:
      type: object
      description: Payment transaction records for a publication.
      additionalProperties: true

    SubscriptionStats:
      type: object
      description: Subscription statistics for a publication.
      additionalProperties: true

    UserSubscription:
      type: object
      description: A publication the authenticated user is subscribed to.
      properties:
        id:
          type: integer
          description: Subscription ID.
        publication_id:
          type: integer
          description: Publication ID.
        user_id:
          type: integer
          description: Subscriber user ID.
        type:
          type: string
          description: Subscription type (e.g. `free`, `paid`, `founding`).
        status:
          type: string
          description: Subscription status.
        created_at:
          type: string
          format: date-time
          description: When the subscription was created.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the subscription expires.
        publication_name:
          type: string
          description: Publication display name.
        publication_slug:
          type: string
          description: Publication slug (subdomain).
      additionalProperties: true

    # ── Growth schemas (typed from io-ts codecs) ────────────────────────

    GrowthSources:
      type: object
      description: Hierarchical growth source breakdown.
      properties:
        sourceMetrics:
          type: array
          items:
            $ref: '#/components/schemas/GrowthSource'
      additionalProperties: true

    GrowthSource:
      type: object
      description: A single growth source with optional nested children.
      properties:
        source:
          type: string
          description: Source identifier (e.g. `substack`, `direct`, `search`).
        sourceName:
          type: string
          description: Human-readable source name.
        originalSourceName:
          type: string
          description: Original source name before normalization.
        category:
          type: string
          description: Source category (e.g. `Social`, `Search`, `Direct`).
        logoUrl:
          type: string
          format: uri
          nullable: true
          description: Logo URL for the source.
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/GrowthMetric'
          description: Metrics for this source.
        children:
          type: array
          items:
            $ref: '#/components/schemas/GrowthSource'
          description: Nested child sources.
      required: [source, sourceName, originalSourceName, category]
      additionalProperties: true

    GrowthMetric:
      type: object
      description: A named metric with optional timeseries data.
      properties:
        name:
          type: string
          description: Metric name (e.g. `users`, `subscribers`).
        total:
          type: number
          description: Total value for the metric.
        timeseries:
          type: array
          items:
            $ref: '#/components/schemas/GrowthMetricTimeseriesPoint'
          description: Time series data points for the metric.
      required: [name]
      additionalProperties: true

    GrowthMetricTimeseriesPoint:
      type: object
      description: A single data point in a growth metric timeseries.
      properties:
        date:
          type: string
          format: date
          description: Date of the data point.
        value:
          type: number
          description: Metric value on this date.
      required: [date, value]
      additionalProperties: false

    GrowthEvents:
      type: object
      description: Publication events for growth correlation.
      properties:
        pubEvents:
          type: array
          items:
            $ref: '#/components/schemas/GrowthEvent'
          description: List of publication events in the date range.
      additionalProperties: true

    GrowthEvent:
      type: object
      description: A single publication event (post, note, etc.) for growth chart annotation.
      properties:
        id:
          type: integer
          description: Event ID.
        date:
          type: string
          format: date
          description: Event date.
        title:
          type: string
          description: Event title.
        slug:
          type: string
          description: Event slug.
        type:
          type: string
          description: Event type (e.g. `post`, `note`).
        url:
          type: string
          format: uri
          description: URL to the event content.
      required: [id, date, title, slug, type]
      additionalProperties: true

    # ── Publication stats schemas (typed from io-ts codecs) ─────────────

    NetworkAttribution:
      type: object
      description: Network attribution data showing subscriber sources.
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAttributionRow'
        total:
          type: integer
          description: Total attributed subscribers.
      additionalProperties: true

    NetworkAttributionRow:
      type: object
      description: A single network attribution entry.
      properties:
        publication_id:
          type: integer
          description: Publication ID.
        time_window:
          type: string
          description: Time window for attribution (e.g. `90+days`).
        is_subscribed:
          type: boolean
          description: Whether the attributed user is subscribed.
        criteria:
          type: string
          description: Attribution criteria (e.g. `search`, `referral`).
        label:
          type: string
          description: Human-readable attribution label.
        subs_count:
          type: integer
          description: Number of subscribers attributed.
        pct_time_window_total:
          type: number
          description: Percentage of total in the time window.
        data_updated_at:
          type: string
          format: date-time
          description: When attribution data was last updated.
      required: [publication_id, time_window, is_subscribed, criteria, label, subs_count, pct_time_window_total, data_updated_at]
      additionalProperties: true

    AudienceLocationTotal:
      type: object
      description: Total audience location counts.
      properties:
        global:
          $ref: '#/components/schemas/LocationTotalEntry'
        usa:
          $ref: '#/components/schemas/LocationTotalEntry'
      additionalProperties: true

    LocationTotalEntry:
      type: object
      description: Location total counts for a region.
      properties:
        locations:
          type: integer
          description: Number of locations.
        total:
          type: integer
          description: Total count across locations.
      additionalProperties: true

    AudienceLocation:
      type: array
      description: Audience geographic distribution.
      items:
        $ref: '#/components/schemas/AudienceLocationEntry'

    AudienceLocationEntry:
      type: object
      description: A single audience location data point.
      properties:
        publication_id:
          type: integer
        granularity:
          type: string
          description: Geographic granularity (e.g. `country`, `region`).
        location:
          type: string
          description: Location name.
        metric:
          type: string
          description: Metric being measured.
        value:
          type: number
          description: Metric value.
        md5:
          type: string
          description: Hash of the location data.
        data_updated_at:
          type: string
          format: date-time
      additionalProperties: true

    AudienceOverlap:
      type: array
      description: Audience overlap with other publications.
      items:
        $ref: '#/components/schemas/AudienceOverlapEntry'

    AudienceOverlapEntry:
      type: object
      description: Overlap percentage with a specific publication.
      properties:
        percentOverlap:
          type: string
          description: Overlap percentage as a string.
        pub:
          $ref: '#/components/schemas/OverlapPublication'
      additionalProperties: true

    OverlapPublication:
      type: object
      description: A publication in an overlap entry.
      properties:
        id:
          type: integer
          description: Publication ID.
        name:
          type: string
          description: Publication name.
      required: [id, name]
      additionalProperties: true

    TrafficTimeseries:
      type: array
      description: Traffic data as date-value pairs.
      items:
        type: array
        items:
          oneOf:
            - type: string
            - type: number
        minItems: 2
        maxItems: 2

    Email30dOpenRate:
      type: object
      description: 30-day email open rate statistics.
      properties:
        openRate:
          type: number
          description: Open rate (0-1).
        openRateDiff:
          type: number
          description: Change in open rate compared to previous period.
      additionalProperties: true

    PledgeSummary:
      type: object
      description: Summary of payment pledges.
      properties:
        totalPledges:
          type: integer
          description: Total number of pledges.
        totalPledgeAmount:
          type: number
          description: Total pledged amount.
        currency:
          type: string
          description: Currency code (e.g. `USD`).
      additionalProperties: true

    Pledges:
      type: object
      description: Pledge data with associated user information.
      properties:
        pledgeAndUserData:
          type: array
          items:
            $ref: '#/components/schemas/PledgeAndUserEntry'
      additionalProperties: true

    PledgeAndUserEntry:
      type: object
      description: A pledge paired with its user.
      properties:
        pledge:
          $ref: '#/components/schemas/Pledge'
        user:
          $ref: '#/components/schemas/PledgeUser'
      required: [pledge, user]
      additionalProperties: true

    Pledge:
      type: object
      description: A single payment pledge record.
      properties:
        publication_id:
          type: integer
        user_id:
          type: integer
        plan_interval:
          type: string
          description: Billing interval (e.g. `month`, `year`).
        payment_currency:
          type: string
          description: Payment currency code.
        payment_amount:
          type: number
          description: Payment amount.
        is_founding:
          type: boolean
          description: Whether this is a founding member pledge.
        created_at:
          type: string
          format: date-time
        note:
          type: string
          nullable: true
          description: Optional note from the pledger.
        can_share_note:
          type: boolean
          description: Whether the note can be shared publicly.
      required: [publication_id, user_id, plan_interval, payment_currency, payment_amount, is_founding, created_at]
      additionalProperties: true

    PledgeUser:
      type: object
      description: User information associated with a pledge.
      properties:
        id:
          type: integer
        name:
          type: string
        handle:
          type: string
        photo_url:
          type: string
          format: uri
          nullable: true
        bio:
          type: string
          nullable: true
        profile_set_up_at:
          type: string
          format: date-time
          nullable: true
      required: [id, name, handle]
      additionalProperties: true
