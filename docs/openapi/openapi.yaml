      operationId: getChatInbox
      security:
        - substackSession: []
      parameters:
        - in: query
          name: tab
          schema:
            type: string
            enum:
              - all
              - people
            default: all
          description: |
            Inbox tab filter. `all` returns every thread type (DMs + publication
            chat rooms). `people` returns only direct-message threads.
      responses:
        '200':
          description: Paginated inbox thread list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatInbox'
