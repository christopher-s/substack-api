name: Docs

on:
  push:
    branches:
      - main
    paths:
      - docs/openapi/**
      - docs/site/**
      - .redocly.yaml
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Lint OpenAPI specification
        run: npx --yes @redocly/cli@latest lint docs/openapi/openapi.yaml --config=.redocly.yaml

      - name: Stage OpenAPI document into site
        run: cp docs/openapi/openapi.yaml docs/site/openapi.yaml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
