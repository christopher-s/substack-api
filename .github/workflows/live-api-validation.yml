name: Live API Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  live-api-validation:
    name: Live API Validation Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Run live API validation tests
        run: pnpm test:unit --testPathPatterns=live-api-validation
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-api-validation-results
          path: |
            coverage/
            junit.xml
