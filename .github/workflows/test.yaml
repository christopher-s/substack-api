name: Build & Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    workflow_dispatch:
    schedule:
        - cron: "0 12 * * 1,4"
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    build:
        name: Running build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'pnpm'
            - name: Install
              run: pnpm install
            - name: Running build
              run: pnpm build
    test:
        name: Running unit tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'pnpm'
            - name: Install
              run: pnpm install
            - name: Running unit tests
              run: pnpm test:unit
            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: unit-test-results
                path: |
                  coverage/
                  junit.xml

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                token: ${{ secrets.CODECOV_TOKEN }}
                files: ./coverage/lcov.info
                flags: unittests
                name: codecov-umbrella
                fail_ci_if_error: false
                verbose: true
    integration:
        name: Running integration tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'pnpm'
            - name: Install
              run: pnpm install
            - name: Running integration tests
              run: pnpm test:integration
            - name: Upload integration test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: integration-test-results
                path: |
                  junit-integration.xml
    lint:
        name: Running linters
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'pnpm'
            - name: Install
              run: pnpm install
            - name: Running linter
              run: pnpm lint
            - name: Running format
              run: pnpm format:check
    e2e:
        name: Running E2E tests
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'pnpm'
            - name: Install
              run: pnpm install
            - name: Check E2E credentials
              id: credentials
              env:
                API_KEY: ${{ secrets.SUBSTACK_API_KEY }}
              run: |
                if [ -n "$API_KEY" ]; then
                  echo "has_credentials=true" >> $GITHUB_OUTPUT
                else
                  echo "has_credentials=false" >> $GITHUB_OUTPUT
                fi
            - name: Running E2E tests
              if: steps.credentials.outputs.has_credentials == 'true'
              run: pnpm test:e2e
              env:
                SUBSTACK_API_KEY: ${{ secrets.SUBSTACK_API_KEY }}
                SUBSTACK_HOSTNAME: ${{ secrets.SUBSTACK_HOSTNAME }}
            - name: Upload E2E test results
              if: always() && steps.credentials.outputs.has_credentials == 'true'
              uses: actions/upload-artifact@v4
              with:
                name: e2e-test-results
                path: |
                  junit-e2e.xml
